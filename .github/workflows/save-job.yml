name: Save job from Telegram

on:
  repository_dispatch:
    types: [save_job]

permissions:
  contents: write

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install python-jobspy

      - name: Scrape single URL & write markdown
        env:
          JOB_URL: ${{ github.event.client_payload.url }}
        run: |
          python scripts/save_one_job.py

      - name: Commit & push
        run: |
          git config user.name "jobs-bot"
          git config user.email "jobs-bot@users.noreply.github.com"
          git add jobs/
          git diff --cached --quiet || (git commit -m "add job from Telegram" && git push)
